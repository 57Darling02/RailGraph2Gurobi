project:
  name: base_demo
  output_dir: outputs/base_demo
  timetable_path: inputs/上行计划时刻表.xlsx
  mileage_path: inputs/区间里程.xlsx
  timetable_sheet_name: Sheet1
  mileage_sheet_name: Sheet1

build:
  scenarios:
    delays: []
    speed_limits: []
    interruptions: []

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: true
  cancellation_penalty_weight: 10000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  cancellation_threshold_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable - Base Demo
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1
