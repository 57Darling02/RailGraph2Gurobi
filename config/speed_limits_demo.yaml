project:
  name: speed_limits_demo
  output_dir: outputs/speed_limits_demo
  timetable_path: inputs/下行计划时刻表.xlsx
  mileage_path: inputs/区间里程.xlsx
  timetable_sheet_name: Sheet1
  mileage_sheet_name: Sheet1

build:
  scenarios:
    delays: []
    speed_limits:
      - start_station: jinanxi
        end_station: taian
        extra_seconds: 300
        start_time: "08:00:00"
        end_time: "10:00:00"
      - start_station: qufudong
        end_station: tengzhoudong
        extra_seconds: 180
        start_time: "09:30:00"
        end_time: "11:30:00"
    interruptions: []

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: false
  cancellation_penalty_weight: 1000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  tolerance_delay_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable - Speed Limits Demo
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1

